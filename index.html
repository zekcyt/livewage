<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" 
          content="IE=edge">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title> Live Wage Tracker </title>
    <link rel="stylesheet" href="style.css">  
</head>
<body>
    <div class="container">
        <h1> Online Stopwatch</h1>

    <div class="subtext">
        <h2> with live wage tracker and currency conversion</h2>

        <div id="rateContainer">
           <input type="number" id="rate" placeholder="rate e.g. 20">

        <div id="currencyContainer">
            <button onclick="setCurrency()" class="dropbtn">Currency ⌄
            </button>
            <div id="rateDropdown" class="dropdown-content">
            <a href="#usd">USD</a>
            <a href="#eur">EUR</a>
            <a href="#pln">PLN</a>
            <a href="#gbp">GBP</a>
            <a href="#jpy">JPY</a>
            <a href="#cny">CNY</a>
            <a href="#aud">AUD</a>
            <a href="#cad">CAD</a>
            <a href="#chf">CHF</a>
            <a href="#rub">RUB</a>
        </div>
    </div>

        <p>Earnings: $<span id="earnings">0.00</span></p>
        </div>
        

        <div id="time">
            <span class="digit" id="hr">
                00</span>
            <span class="txt">:</span>
            <span class="digit" id="min">
                00</span>
            <span class="txt">:</span>
            <span class="digit" id="sec">
                00</span>
            <span class="txt">:</span>
            <span class="digit" id="count">
                00</span>
        </div>
        <div id="buttons">
            <button class="btn" id="start"> 
                Start</button>
            <button class="btn" id="stop"> 
                Stop</button>
            <button class="btn" id="reset"> 
                Reset</button>
        </div>
    </div>
    <script src="index.js"></script>

</body>

</html>
